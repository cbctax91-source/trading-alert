name: 매매신호 카카오알림

# ============================================================
# 실행 방식 (2가지 병행)
#  1) GitHub 자체 schedule (백업용, 누락 잦음)
#  2) 외부 스케줄러(cron-job.org)가 repository_dispatch로 깨움 (주력, 정확)
#  cron은 UTC 기준. 한국시간 KST = UTC + 9
# ============================================================
on:
  # 외부 스케줄러(cron-job.org)가 이걸로 깨움 — 정확한 자동실행
  repository_dispatch:
    types: [run-bot]

  # GitHub 자체 스케줄 (백업. 누락될 수 있음)
  schedule:
    - cron: '7 0-5 * * 1-5'
    - cron: '37 6 * * 1-5'
    - cron: '37 13 * * 1-5'
    - cron: '37 14-19 * * 1-5'
    - cron: '7 20 * * 1-5'
    - cron: '7 21 * * 1-5'

  # 수동 실행 버튼
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 라이브러리 설치
        run: pip install -r requirements.txt
      - name: 봇 실행
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
        run: python bot_cloud.py

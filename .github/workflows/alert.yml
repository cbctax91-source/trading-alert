name: 매매신호 카카오알림

# ============================================================
# 실행 일정 (cron은 UTC 기준. 한국시간 KST = UTC + 9)
#
#  ● 한국장 (KST 09:00~15:30 = UTC 00:00~06:30) : 1시간 간격 + 마감
#  ● 미국장 서머타임 EDT (KST 22:30~05:00 = UTC 13:30~20:00) : 1시간 간격 + 마감
#    ※ 겨울(EST)엔 미국장이 1시간 늦어짐 → UTC 21:00 마감 보정 포함
#
#  cron 형식: '분 시 일 월 요일'  /  월~금(1-5)만
# ============================================================
on:
  schedule:
    # ---- 한국장 (KST 09:00~15:30) ----
    - cron: '0 0-5 * * 1-5'       # KST 09:00,10:00,11:00,12:00,13:00,14:00 (1시간 간격)
    - cron: '30 6 * * 1-5'        # KST 15:30 (마감)

    # ---- 미국장 (서머타임 ET 09:30~16:00 = UTC 13:30~20:00) ----
    - cron: '30 13 * * 1-5'       # 미국장 시작 09:30 ET
    - cron: '30 14-19 * * 1-5'    # 장중 1시간 간격 (ET 10:30~15:30)
    - cron: '0 20 * * 1-5'        # 서머타임 마감 16:00 ET
    - cron: '0 21 * * 1-5'        # 겨울(EST) 마감 보정 16:00 EST

  # 수동 실행 버튼(테스트용)
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 봇 실행
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
        run: python bot_cloud.py
